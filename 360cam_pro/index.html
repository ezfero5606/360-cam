<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360 Pano Cam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #camera-view { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        header { background: rgba(0,0,0,0.5); color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        #hud { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .target-box { width: 40px; height: 40px; border: 3px solid #ff3b30; border-radius: 50%; position: absolute; box-shadow: 0 0 10px rgba(255,59,48,0.5); }
        .target-box::after { content: 'HOLD'; position: absolute; top: 45px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        footer { background: rgba(0,0,0,0.5); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .counter { color: white; font-size: 16px; }
        .progress-bg { width: 80%; background: rgba(255,255,255,0.3); height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #4cd964; transition: width 0.2s; }
        .btn { background: #4cd964; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 16px; font-weight: bold; display: none; cursor: pointer; }
        #preview-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #000; display: none; flex-direction: column; }
        #pano-canvas { width: 100%; flex-grow: 1; object-fit: contain; }
        .preview-buttons { padding: 20px; display: flex; justify-content: space-around; background: #111; }
        .btn-retry { background: #ff3b30; }
        #init-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .init-btn { background: #007aff; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="init-screen">
        <h2>360° Kamera Başlatıcı</h2>
        <p>Lütfen kamera ve hareket sensörü izinlerini onaylayın.</p>
        <button id="btn-start" class="init-btn interactive">Kamerayı Aç</button>
    </div>

    <video id="camera-view" autoplay playsinline muted></video>

    <div id="ui-overlay">
        <header id="status-text">Cihazı Hedefe Doğru Çevirin</header>
        <div id="hud">
            <div id="target-box" class="target-box"></div>
        </div>
        <footer>
            <div id="counter" class="counter">Çekilen Kare: 0 / 22</div>
            <div class="progress-bg">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <button id="btn-stitch" class="btn interactive">🔄 Resmi Birleştir</button>
        </footer>
    </div>

    <div id="preview-screen">
        <canvas id="pano-canvas"></canvas>
        <div class="preview-buttons">
            <button id="btn-restart" class="btn btn-retry interactive">🔄 Yeniden Dene</button>
            <button id="btn-download" class="btn interactive" style="display:block;">💾 Galeriye Kaydet</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const targetBox = document.getElementById('target-box');
        const statusText = document.getElementById('status-text');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progress-bar');
        const btnStitch = document.getElementById('btn-stitch');
        const previewScreen = document.getElementById('preview-screen');
        const panoCanvas = document.getElementById('pano-canvas');
        const initScreen = document.getElementById('init-screen');

        let currentYaw = 0, currentPitch = 0;
        let isCapturing = false;
        let activeTargetIndex = 0;
        let capturedPoints = [];

        // 22 Noktalı Küresel Çekim Şablonu
        const capturePointsGrid = [
            // Karşı Sıra (10 Nokta)
            { yaw: 0, pitch: 0, row: 'mid' }, { yaw: 36, pitch: 0, row: 'mid' }, { yaw: 72, pitch: 0, row: 'mid' }, 
            { yaw: 108, pitch: 0, row: 'mid' }, { yaw: 144, pitch: 0, row: 'mid' }, { yaw: 180, pitch: 0, row: 'mid' }, 
            { yaw: -144, pitch: 0, row: 'mid' }, { yaw: -108, pitch: 0, row: 'mid' }, { yaw: -72, pitch: 0, row: 'mid' }, { yaw: -36, pitch: 0, row: 'mid' },
            // Üst Sıra (5 Nokta)
            { yaw: 0, pitch: 32, row: 'top' }, { yaw: 72, pitch: 32, row: 'top' }, { yaw: 144, pitch: 32, row: 'top' }, { yaw: -144, pitch: 32, row: 'top' }, { yaw: -72, pitch: 32, row: 'top' },
            // Alt Sıra (5 Nokta)
            { yaw: 0, pitch: -32, row: 'bottom' }, { yaw: 72, pitch: -32, row: 'bottom' }, { yaw: 144, pitch: -32, row: 'bottom' }, { yaw: -144, pitch: -32, row: 'bottom' }, { yaw: -72, pitch: -32, row: 'bottom' },
            // Tepe ve Taban Yaması
            { yaw: 0, pitch: 75, row: 'zenith' }, { yaw: 0, pitch: -75, row: 'nadir' }
        ];

        document.getElementById('btn-start').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
                video.srcObject = stream;
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') { window.addEventListener('deviceorientation', handleOrientation); initScreen.style.display = 'none'; }
                    else { alert('Sensör izni reddedildi.'); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    initScreen.style.display = 'none';
                }
            } catch (err) {
                alert('Hata: ' + err.message);
            }
        });

        function handleOrientation(event) {
            if (!event.alpha && !event.beta) return;
            
            let alpha = event.alpha; 
            let beta = event.beta;   
            let yaw = alpha > 180 ? alpha - 360 : alpha;
            let pitch = beta - 70; 
            
            currentYaw = -yaw; 
            currentPitch = -pitch;

            if (activeTargetIndex < capturePointsGrid.length) {
                const target = capturePointsGrid[activeTargetIndex];
                let diffYaw = target.yaw - currentYaw;
                if (diffYaw > 180) diffYaw -= 360;
                if (diffYaw < -180) diffYaw += 360;
                let diffPitch = target.pitch - currentPitch;

                // Eski sade kırmızı hedef kutusunun ekrandaki yerini güncelleme
                const scale = 8; 
                let x = diffYaw * scale;
                let y = -diffPitch * scale;
                targetBox.style.transform = `translate(${x}px, ${y}px)`;

                // Tetiklenme alanı (3 derece hata payı)
                if (Math.abs(diffYaw) < 3 && Math.abs(diffPitch) < 3 && !isCapturing) {
                    triggerCapture();
                }
            }
        }

        function triggerCapture() {
            isCapturing = true;
            statusText.innerText = "Fotoğraf Kaydediliyor...";

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // RAM Dostu Ayar: Kaliteyi 0.55 yaptık
            const dataUrl = canvas.toDataURL('image/jpeg', 0.55);

            capturedPoints.push({
                image: dataUrl,
                yaw: capturePointsGrid[activeTargetIndex].yaw,
                pitch: capturePointsGrid[activeTargetIndex].pitch,
                row: capturePointsGrid[activeTargetIndex].row
            });

            activeTargetIndex++;
            counter.innerText = `Çekilen Kare: ${activeTargetIndex} / 22`;
            progressBar.style.width = `${(activeTargetIndex / capturePointsGrid.length) * 100}%`;

            if (activeTargetIndex < capturePointsGrid.length) {
                // Güvenli Bekleme Payı: Donmayı önlemek için 400ms yaptık
                setTimeout(() => {
                    isCapturing = false;
                    statusText.innerText = "Cihazı Hedefe Doğru Çevirin";
                }, 400);
            } else {
                targetBox.style.display = 'none';
                statusText.innerText = "Çekim Tamamlandı!";
                btnStitch.style.display = 'block';
            }
        }

        btnStitch.addEventListener('click', () => {
            statusText.innerText = "Panorama Oluşturuluyor...";
            setTimeout(() => {
                renderPanorama();
            }, 500);
        });

        function renderPanorama() {
            panoCanvas.width = 2400;
            panoCanvas.height = 1200;
            const pCtx = panoCanvas.getContext('2d');
            pCtx.fillStyle = '#f0f0f0';
            pCtx.fillRect(0, 0, panoCanvas.width, panoCanvas.height);

            const sliceWidth = panoCanvas.width / 10; 
            const sliceHeight = panoCanvas.height / 3; 

            capturedPoints.forEach(point => {
                const img = new Image();
                img.src = point.image;
                img.onload = () => {
                    let dx = 0, dy = 0, dw = sliceWidth, dh = sliceHeight;
                    let normYaw = point.yaw < 0 ? point.yaw + 360 : point.yaw;
                    let colIndex = Math.floor((normYaw / 360) * 10) % 10;

                    if (point.row === 'mid') {
                        dx = colIndex * sliceWidth; dy = sliceHeight; 
                    } else if (point.row === 'top') {
                        let topColIndex = Math.floor((normYaw / 360) * 5) % 5;
                        dx = topColIndex * (sliceWidth * 2); dy = 0; dw = sliceWidth * 2;
                    } else if (point.row === 'bottom') {
                        let botColIndex = Math.floor((normYaw / 360) * 5) % 5;
                        dx = botColIndex * (sliceWidth * 2); dy = sliceHeight * 2; dw = sliceWidth * 2;
                    } else if (point.row === 'zenith') {
                        dx = 0; dy = 0; dw = panoCanvas.width; dh = sliceHeight / 2;
                    } else if (point.row === 'nadir') {
                        dx = 0; dy = panoCanvas.height - (sliceHeight / 2); dw = panoCanvas.width; dh = sliceHeight / 2;
                    }
                    pCtx.drawImage(img, dx, dy, dw, dh);
                };
            });

            setTimeout(() => {
                previewScreen.style.display = 'flex';
            }, 1000);
        }

        document.getElementById('btn-restart').addEventListener('click', () => {
            capturedPoints = [];
            activeTargetIndex = 0;
            counter.innerText = "Çekilen Kare: 0 / 22";
            progressBar.style.width = "0%";
            previewScreen.style.display = 'none';
            btnStitch.style.display = 'none';
            targetBox.style.display = 'block';
            isCapturing = false;
            statusText.innerText = "Cihazı Hedefe Doğru Çevirin";
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `360_Panorama.jpg`;
            link.href = panoCanvas.toDataURL('image/jpeg', 0.90);
            link.click();
        });
    </script>
</body>
</html>
